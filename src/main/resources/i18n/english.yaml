file_version: 19
kick:
  vpn_abuse: |
    &5[VPN Usage Detected]
    &7Joining with &5VPNs&7 is not allowed on this server.
    If you want to continue please disable all &5proxies&7 and &5VPNs

    &7Not using a &5VPN? &7Please create an issue providing
    this IP: {ip} at:

    https://github.com/Tulis12/ProxieSuite
    or contact admins at abuse@xyz.net
  proxy_not_ready: |
    &5Server is not ready yet

    &7Sorry for inconvenience, but server is not ready yet!
    Please wait a few seconds and try to log in again.
  nonpremium_logged_as_premium: |
    &5You must login with premium account!

    &7Sorry, but in the past you logged in using
    a premium account, or you configured premium login.

    &7You lost access to your premium account?
    Contact administration at: &5admin@xyz.net
  server_error: |
    &5There was an error on the server side!

    &7Sorry for inconvenience but something on the
    server side broke down and started crying.

    The admins got notified of this, and you should try sometime again soon.

command:
  general_error:
    only_player: "&cOnly players can use this command!"
    syntax: "&cYou used the command incorrectly! &7Usage:"
    insufficient_permissions: "&cYou don't have permission for that."

  error:
    login:
      wrong_password: "&cWrong password!"
      already_authenticated: "&cYou are already logged in!"
      not_registered: "&cYou are not registered!"
    register:
      you_already_registered: "&cYou already registered! Use /login"
      password_do_not_match: "&cPasswords don't match!"
      password_is_password: "&7Please don't use &npassword&r&7 as your password!"
    proxiesuite:
      reload: "&cThere was an error during reloading the config, please check the logs for more info."

  success:
    login: "&2You sucessfully logged in! Redirecting..."
    proxiesuite:
      reload: "&2Successfully reloaded config!"

  joke:
    register:
      password_is_password: "&7I didn't mean password as in &npassword&r&7, please be a little bit more creative..."

