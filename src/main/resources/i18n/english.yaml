file_version: 21

kick_console:
  tempban: "tempbanned reason: {1} by: {2} for: {3} ends at: {4}"
  ban: "banned; Reason: {1}; Banned by: {2}"

utils:
  console: "Console"

kick:
  tempban: |
    &5You are banned!

    &7Reason: &5{reason}
    &7by: {bannedBy}

    &7You are banned for: {end}
    &7You will be unbanned at: {endDate}

  ban: |
    &5You are banned &5pernamently!

    &7Reason: &5{reason}
    &7by: {bannedBy}

  vpn_abuse: |
    &5[VPN Usage Detected]
    &7Joining with &5VPNs&7 is not allowed on this server.
    If you want to continue please disable all &5proxies&7 and &5VPNs

    &7Not using a &5VPN? &7Please create an issue providing
    this IP: {ip} at:

    https://github.com/Tulis12/ProxieSuite
    or contact admins at abuse@xyz.net
  proxy_not_ready: |
    &5Server is not ready yet

    &7Sorry for inconvenience, but server is not ready yet!
    Please wait a few seconds and try to log in again.
  nonpremium_logged_as_premium: |
    &5You must login with premium account!

    &7Sorry, but in the past you logged in using
    a premium account, or you configured premium login.

    &7You lost access to your premium account?
    Contact administration at: &5admin@xyz.net
  server_error: |
    &5There was an error on the server side!

    &7Sorry for inconvenience but something on the
    server side broke down and started crying.

    The admins got notified of this, and you should try sometime again soon.
  default_ban_reason: "Banned by the administrator."

command:
  general_error:
    only_player: "&cOnly players can use this command!"
    syntax: "&cYou used the command incorrectly! &7Usage:"
    insufficient_permissions: "&cYou don't have permission for that."
    server_error: "&4Sorry, but there was an error in the server when processing your request. Please try again later."

  error:
    login:
      wrong_password: "&cWrong password!"
      already_authenticated: "&cYou are already logged in!"
      not_registered: "&cYou are not registered!"
    register:
      you_already_registered: "&cYou already registered! Use /login"
      password_do_not_match: "&cPasswords don't match!"
      password_is_password: "&7Please don't use &npassword&r&7 as your password!"
    proxiesuite:
      reload: "&cThere was an error during reloading the config, please check the logs for more info."
    premium:
      you_are_already_premium: "&7You are already logged in premium account."

  syntax:
    login: "/{alias} <password>"
    register: "/{alias} <password> <repeat that password>"
    premium: "/{alias} confirm"

  info:
    proxiesuite:
      version: "&7This server uses &5ProxieSuite &7version: {version}"
    login:
      password: "password"
    register:
      password: "password"
      repeat_password: "repeat password"
    premium:
      are_you_sure: "&7Are you sure you want to enable &5PREMIUM &7mode? &7This action is &7irreversible. &7You will only be able to join with your premium &7account &7from now on. Type &5/premium confirm&7 to continue."

  success:
    login: "&2You sucessfully logged in! Redirecting..."
    register: "&2You sucessfully registered! Welcome!"
    proxiesuite:
      reload: "&2Successfully reloaded config!"
    premium: |
      &5Premium login has been enabled!

      &7Rejoin the server using a premium account and
      you will be logged in automatically!

  joke:
    register:
      password_is_password: "&7I didn't mean password as in &npassword&r&7, please be a little bit more creative..."

event:
  error:
    change_server:
      not_logged_in: "&cYou are not logged in!"

  info:
    join:
      login: "&7Login using /login <password>"
      register: "&7Register using /register <password> <repeat that password>"
    legacy_join:
      propose_premium: "&7Have a &5premium account? &7Enable premium login with &5/premium &7and log in without needing to enter a password."
